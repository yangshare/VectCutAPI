events {
    worker_connections 1024;
}

http {
    upstream vectcut_api {
        server api:9001;
    }

    # 限流：每 IP 每秒 10 个请求，突发 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS 主服务
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL 证书（占位，生产替换为真实证书路径）
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 母版 ZIP 上传上限：50MiB ZIP + multipart overhead
        client_max_body_size 52M;

        # API 代理：proxy_pass 不带尾部斜杠，保留 /api 前缀
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            # 基础认证（生产环境默认启用）
            auth_basic "VectCut API";
            auth_basic_user_file /etc/nginx/ssl/.htpasswd;

            proxy_pass http://vectcut_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # 健康检查（运维探活用）
        location = /health {
            proxy_pass http://vectcut_api/health;
        }
    }
}
